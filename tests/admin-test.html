<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; }
        .test-button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; cursor: pointer; }
        .result { margin-top: 10px; padding: 10px; background: #f8f9fa; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>🔧 APS Dream Home - Admin Panel Test</h1>
    
    <div class="test-section">
        <h2>Quick Tests</h2>
        <button class="test-button" onclick="testAdminPanel()">Open Admin Panel</button>
        <button class="test-button" onclick="testProjectCRUD()">Test Project CRUD</button>
        <button class="test-button" onclick="testPropertyCRUD()">Test Property CRUD</button>
        <button class="test-button" onclick="testUserManagement()">Test User Management</button>
    </div>
    
    <div class="test-section">
        <h2>API Tests</h2>
        <button class="test-button" onclick="testAPIHealth()">API Health Check</button>
        <button class="test-button" onclick="testAPIProperties()">API Properties</button>
        <button class="test-button" onclick="testAPILeads()">API Leads</button>
    </div>
    
    <div id="result" class="result">
        <h3>Test Results:</h3>
        <p>Click any test button above to start testing...</p>
    </div>
    
    <script>
        function testAdminPanel() {
            window.open('/apsdreamhome/admin/', '_blank');
            document.getElementById('result').innerHTML = '<p>✅ Admin panel opened in new tab</p>';
        }
        
        function testProjectCRUD() {
            window.open('/apsdreamhome/admin/projects', '_blank');
            document.getElementById('result').innerHTML = '<p>✅ Project management opened</p>';
        }
        
        function testPropertyCRUD() {
            window.open('/apsdreamhome/admin/properties', '_blank');
            document.getElementById('result').innerHTML = '<p>✅ Property management opened</p>';
        }
        
        function testUserManagement() {
            window.open('/apsdreamhome/admin/users', '_blank');
            document.getElementById('result').innerHTML = '<p>✅ User management opened</p>';
        }
        
        function testAPIHealth() {
            fetch('/apsdreamhome/api/health')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('result').innerHTML = '<p>✅ API Health: ' + JSON.stringify(data, null, 2) + '</p>';
                })
                .catch(error => {
                    document.getElementById('result').innerHTML = '<p>❌ API Error: ' + error.message + '</p>';
                });
        }
        
        function testAPIProperties() {
            fetch('/apsdreamhome/api/properties')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('result').innerHTML = '<p>✅ API Properties: ' + JSON.stringify(data, null, 2) + '</p>';
                })
                .catch(error => {
                    document.getElementById('result').innerHTML = '<p>❌ API Error: ' + error.message + '</p>';
                });
        }
        
        function testAPILeads() {
            fetch('/apsdreamhome/api/leads')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('result').innerHTML = '<p>✅ API Leads: ' + JSON.stringify(data, null, 2) + '</p>';
                })
                .catch(error => {
                    document.getElementById('result').innerHTML = '<p>❌ API Error: ' + error.message + '</p>';
                });
        }
    </script>
</body>
</html>
