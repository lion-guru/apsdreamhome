# APS Dream Home - Nginx Production Configuration
# Place this file at /etc/nginx/sites-available/apsdreamhome
# Then run: sudo ln -s /etc/nginx/sites-available/apsdreamhome /etc/nginx/sites-enabled/
# And: sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS Server Block
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # Root directory
    root /var/www/apsdreamhome/public;
    index index.php index.html index.htm;

    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/xml
        application/atom+xml
        image/svg+xml;

    # PHP-FPM Configuration
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;

        # PHP Timeouts
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 300;
    }

    # Static Assets with Caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|pdf|zip|rar)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;

        # Security for uploads
        location ~* ^/storage/uploads/ {
            expires 30d;
            add_header Cache-Control "public, must-revalidate, proxy-revalidate";
        }
    }

    # Laravel Routes (Main Application)
    location / {
        try_files $uri $uri/ /index.php?$query_string;

        # Security
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Deny access to sensitive files
        location ~ /(storage/logs|bootstrap/cache|\.env|\.git|composer\.json|composer\.lock|package\.json|webpack\.mix\.js|artisan) {
            deny all;
            return 404;
        }

        # Deny access to backup files
        location ~ \.(bak|backup|old|orig|swp|swo)$ {
            deny all;
            return 404;
        }
    }

    # API Routes
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;

        # CORS headers for API
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With";
        add_header Access-Control-Max-Age 86400;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Admin Panel Routes
    location /admin/ {
        try_files $uri $uri/ /index.php?$query_string;

        # Additional security for admin
        add_header X-Robots-Tag "noindex, nofollow";
    }

    # File Upload Handling
    location /upload {
        client_max_body_size 10M;
        client_body_timeout 300s;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # Health Check Endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # PHP Info (Development Only - Remove in Production)
    # location /phpinfo {
    #     include snippets/fastcgi-php.conf;
    #     fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
    #     fastcgi_param SCRIPT_FILENAME $document_root/phpinfo.php;
    # }

    # Error Pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # Rate Limiting (Optional - Uncomment if needed)
    # limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # limit_req zone=api burst=20 nodelay;

    # location /api/ {
    #     limit_req zone=api burst=20 nodelay;
    #     try_files $uri $uri/ /index.php?$query_string;
    # }

    # Logs
    access_log /var/log/nginx/apsdreamhome_access.log;
    error_log /var/log/nginx/apsdreamhome_error.log;
}

