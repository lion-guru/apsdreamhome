name: Automated Testing Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: apsdreamhome_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, mysql, bcmath, gd, zip, intl, dom, curl
        coverage: xdebug
    
    - name: Copy .env
      run: cp .env.example .env
    
    - name: Install dependencies
      run: composer install --no-progress --no-interaction --prefer-dist
    
    - name: Create database
      run: |
        mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS apsdreamhome_test;"
    
    - name: Run migrations
      run: php artisan migrate --database=apsdreamhome_test
    
    - name: Run unit tests
      run: |
        vendor/bin/phpunit --testsuite=Unit --coverage-clover=coverage.xml --log-junit=unit-tests.xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: unit-test-results
        path: unit-tests.xml

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: apsdreamhome_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, mysql, bcmath, gd, zip, intl, dom, curl, redis
        coverage: xdebug
    
    - name: Copy .env
      run: cp .env.example .env
    
    - name: Install dependencies
      run: composer install --no-progress --no-interaction --prefer-dist
    
    - name: Create database
      run: |
        mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS apsdreamhome_test;"
    
    - name: Run migrations
      run: php artisan migrate --database=apsdreamhome_test
    
    - name: Run integration tests
      run: |
        vendor/bin/phpunit --testsuite=Integration --coverage-clover=coverage-integration.xml --log-junit=integration-tests.xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage-integration.xml
        flags: integrationtests
        name: codecov-umbrella
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: integration-test-results
        path: integration-tests.xml

  feature-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: apsdreamhome_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, mysql, bcmath, gd, zip, intl, dom, curl, redis
    
    - name: Copy .env
      run: cp .env.example .env
    
    - name: Install dependencies
      run: composer install --no-progress --no-interaction --prefer-dist
    
    - name: Create database
      run: |
        mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS apsdreamhome_test;"
    
    - name: Run migrations
      run: php artisan migrate --database=apsdreamhome_test
    
    - name: Seed database
      run: php artisan db:seed --database=apsdreamhome_test
    
    - name: Start application
      run: |
        php artisan serve --host=0.0.0.0 --port=8000 &
        sleep 5
    
    - name: Install ChromeDriver
      run: |
        wget -q -O - https://dl.google.com/linux/direct/chrome-for-testing-latest.deb | dpkg -i -
        google-chrome --version
        CHROMEDRIVER_VERSION=$(curl -sS chromedriver.storage.googleapis.com/LATEST_RELEASE)
        wget -O /tmp/chromedriver.zip http://chromedriver.storage.googleapis.com/$CHROMEDRIVER_VERSION/chromedriver_linux64.zip
        unzip /tmp/chromedriver.zip -d /tmp/
        chmod +x /tmp/chromedriver
        mv /tmp/chromedriver /usr/local/bin/chromedriver
    
    - name: Run feature tests
      run: |
        vendor/bin/phpunit --testsuite=Feature --log-junit=feature-tests.xml
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: feature-test-results
        path: feature-tests.xml

  performance-tests:
    runs-on: ubuntu-latest
    needs: feature-tests
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, mysql, bcmath, gd, zip, intl, dom, curl
    
    - name: Install dependencies
      run: composer install --no-progress --no-interaction --prefer-dist
    
    - name: Run performance tests
      run: |
        vendor/bin/phpunit tests/Performance --log-junit=performance-tests.xml
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: performance-test-results
        path: performance-tests.xml

  security-tests:
    runs-on: ubuntu-latest
    needs: performance-tests
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, mysql, bcmath, gd, zip, intl, dom, curl
    
    - name: Install dependencies
      run: composer install --no-progress --no-interaction --prefer-dist
    
    - name: Run security tests
      run: |
        vendor/bin/phpunit tests/Security --log-junit=security-tests.xml
    
    - name: Run security scan
      run: |
        composer audit
        vendor/bin/phpstan analyse --error-format=json
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-test-results
        path: security-tests.xml

  test-report:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, feature-tests, performance-tests, security-tests]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Download test results
      uses: actions/download-artifact@v3
      with:
        name: unit-test-results
    - name: Download test results
      uses: actions/download-artifact@v3
      with:
        name: integration-test-results
    - name: Download test results
      uses: actions/download-artifact@v3
      with:
        name: feature-test-results
    - name: Download test results
      uses: actions/download-artifact@v3
      with:
        name: performance-test-results
    - name: Download test results
      uses: actions/download-artifact@v3
      with:
        name: security-test-results
    
    - name: Generate test report
      run: |
        php scripts/generate-test-report.php
    
    - name: Upload test report
      uses: actions/upload-artifact@v3
      with:
        name: test-report
        path: test-report.html
    
    - name: Comment PR with test results
      uses: actions/github-script@v6
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('test-report.html', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🧪 Test Results Report\n\n${report}`
          });
