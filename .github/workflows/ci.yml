name: APS Dream Home CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: apsdreamhome_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: pdo, pdo_mysql, mysqli, mbstring, zip, curl
        ini-values: post_max_size=256M, upload_max_filesize=256M

    - name: Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install Composer dependencies
      run: composer install --no-progress --prefer-dist --optimize-autoloader

    - name: Create .env.testing file
      run: |
        cp .env.example .env.testing || echo "DB_CONNECTION=mysql" > .env.testing
        echo "DB_HOST=127.0.0.1" >> .env.testing
        echo "DB_PORT=3306" >> .env.testing
        echo "DB_DATABASE=apsdreamhome_test" >> .env.testing
        echo "DB_USERNAME=testuser" >> .env.testing
        echo "DB_PASSWORD=testpass" >> .env.testing
        echo "APP_ENV=testing" >> .env.testing
        echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env.testing

    - name: Wait for MySQL
      run: |
        while ! mysqladmin ping -h"127.0.0.1" -P"3306" --silent; do
          echo "Waiting for MySQL..."
          sleep 2
        done
        echo "MySQL is ready!"

    - name: Run database migrations
      run: |
        php tests/migrate.php || echo "Migration script not found, skipping"

    - name: Run test suite
      run: |
        # Try PHPUnit first
        if [ -f "vendor/bin/phpunit" ]; then
          ./vendor/bin/phpunit --configuration phpunit.xml --coverage-text --colors=never
        else
          # Fall back to custom test runner
          php tests/run_all_tests.php | grep -E "(✅|❌|⚠️|Total Tests|Pass Rate)" || echo "Test runner completed"
        fi

    - name: Run syntax check
      run: |
        find . -name "*.php" -not -path "./vendor/*" -not -path "./tests/coverage/*" -exec php -l {} \; | grep -v "No syntax errors detected"

    - name: Check for security vulnerabilities
      run: |
        if command -v composer &> /dev/null; then
          composer audit || echo "Composer audit completed with warnings"
        else
          echo "Composer not available for security audit"
        fi

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Install PHP CS Fixer
      run: composer global require friendsofphp/php-cs-fixer --no-progress

    - name: Run PHP CS Fixer (check only)
      run: |
        export PATH="$PATH:$HOME/.composer/vendor/bin"
        if command -v php-cs-fixer &> /dev/null; then
          php-cs-fixer fix --dry-run --diff --config=.php-cs-fixer.php . || echo "PHP CS Fixer found style issues"
        else
          echo "PHP CS Fixer not available, skipping style check"
        fi

  deploy-staging:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
    - name: Deploy to staging
      run: |
        echo "🚀 Deploying to staging environment..."
        # Add your staging deployment commands here
        echo "Staging deployment would happen here"

  deploy-production:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Deploy to production
      run: |
        echo "🚀 Deploying to production environment..."
        # Add your production deployment commands here
        echo "Production deployment would happen here"
