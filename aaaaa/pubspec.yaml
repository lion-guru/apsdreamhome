name: aps_dream_home
description: Premium Flutter app for APS Dream Home Real Estate & MLM platform with offline-first capabilities.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Core Architecture
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.3
  
  # Networking & API
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  
  # Database & Storage
  sqflite: ^2.3.0
  path: ^1.8.3
  flutter_secure_storage: ^9.0.0
  
  # UI & Utilities
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_svg: ^2.0.9
  
  # Advanced Features
  permission_handler: ^11.1.0
  image_picker: ^1.0.7
  speech_to_text: ^6.6.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  retrofit_generator: ^8.0.4
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
